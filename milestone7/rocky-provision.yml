---
- name: Post Provision Rocky Linux VMs
  hosts: all
  gather_facts: false

  tasks:
    - name: Add deployer public key
      ansible.builtin.authorized_key:
        user: deployer
        state: present
        key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

    - name: Create sudoers drop-in for deployer
      ansible.builtin.copy:
        dest: /etc/sudoers.d/deployer
        content: "deployer ALL=(ALL) NOPASSWD: ALL\n"
        mode: '0440'
        validate: /usr/sbin/visudo -cf %s

    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ new_hostname }}"

    - name: Set static IP via nmcli
      ansible.builtin.command:
        cmd: >
          nmcli con mod ens33
          ipv4.method manual
          ipv4.addresses {{ static_ip }}/{{ subnet_prefix }}
          ipv4.gateway {{ gateway }}
          ipv4.dns {{ dns_server }}
      changed_when: true

    - name: Bring connection up with new static IP
      ansible.builtin.command:
        cmd: nmcli con up ens33
      async: 10
      poll: 0
